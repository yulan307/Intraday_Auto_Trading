[project]
name = "intraday-auto-trading"
timezone = "America/New_York"
paper_trading = true
currency = "USD"

[symbols]
pool = ["SPY", "QQQ", "AAPL", "MSFT"]

[strategy]
tracking_confirmation_bars = 2
tracking_limit_price_factor = 1.01
force_buy_last_minutes = 15
opening_review_cutoff = "10:00"

[selection]
weak_tail_weight = 3.0
range_track_weight = 2.0
early_buy_weight = 1.0
unbought_bonus = 2.0
recent_fill_penalty_step = 0.5

[data]
market_data_db = "data/market_data.sqlite"
providers = ["ibkr", "moomoo"]
data_types = ["bars", "opening_imbalance", "options"]
enable_direct_15m = true
enable_derived_15m = true

[ibkr]
default_profile = "paper"

[ibkr.paper]
host = "127.0.0.1"
port = 4002
client_id = 9          # used by IBKRMarketDataGateway
account_client_id = 10 # used by IBKRAccountGateway
broker_client_id = 11  # used by IBKRBrokerGateway
account_id = ""
readonly = true

[ibkr.live]
host = "127.0.0.1"
port = 4001
client_id = 9
account_client_id = 10
broker_client_id = 11
account_id = ""
readonly = true

[moomoo]
enabled = true
host = "127.0.0.1"
port = 11111
account_id = ""
market = "US"

[yfinance]
enabled = true
request_timeout_seconds = 30
