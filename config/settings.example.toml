[project]
name = "intraday-auto-trading"
timezone = "America/New_York"
paper_trading = true
currency = "USD"

# Symbol groups live in config/symbol_group.toml.

[strategy]
ema_fast_span = 5
ema10_span = 10
ema_slow_span = 20
dev20_window = 10       # Theil-Sen window for s_dev20
s_dev20_window = 10     # Theil-Sen window for ss_dev20
valley_window = 3       # Theil-Sen window for s_valley
opening_review_cutoff = "10:00"

[selection]
weak_tail_weight = 3.0
range_track_weight = 2.0
early_buy_weight = 1.0
unbought_bonus = 2.0
recent_fill_penalty_step = 0.5

[data]
market_data_db = "data/market_data.sqlite"
providers = ["ibkr"]
data_types = ["bars"]
enable_direct_15m = false
enable_derived_15m = false

[ibkr]
default_profile = "paper"

[ibkr.paper]
host = "127.0.0.1"
port = 4002
client_id = 9          # used by IBKRMarketDataGateway
account_client_id = 10 # used by IBKRAccountGateway
broker_client_id = 11  # used by IBKRBrokerGateway
account_id = ""
readonly = true

[ibkr.live]
host = "127.0.0.1"
port = 4001
client_id = 9
account_client_id = 10
broker_client_id = 11
account_id = ""
readonly = true

[moomoo]
enabled = true
host = "127.0.0.1"
port = 11111
account_id = ""
market = "US"

[yfinance]
enabled = true
request_timeout_seconds = 30
